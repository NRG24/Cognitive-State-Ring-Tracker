# OpenOCD configuration for Raspberry Pi Debug Probe + nRF52832
# Save this file and reference it with: openocd -f openocd.cfg

# --- Interface: Raspberry Pi Debug Probe (CMSIS-DAP) ---
interface cmsis-dap
transport select swd

# SWD speed (start conservative, can increase to 4000 if stable)
adapter speed 1000

# --- Target: nRF52832 ---
source [find target/nrf52.cfg]
